apiVersion: apps/v1
kind: Deployment
metadata:
  name: at-ai-editor-recommender
  namespace: er
  labels:
    app: at-ai-editor-recommender
spec:
  replicas: 1
  selector:
    matchLabels:
      app: at-ai-editor-recommender
  template:
    metadata:
      labels:
        app: at-ai-editor-recommender
    spec:
      containers:
      - name: at-ai-editor-recommender
        image: ghcr.io/pubs-digital-transformation-r-d-team/ee-api-poc/at-ai-editor-recommender:0.1
        ports:
        - containerPort: 8012
        resources:
          limits:
            cpu: "500m"
            memory: "1024Mi"
          requests:
            cpu: "100m"
            memory: "1024Mi"
        env:
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: http://phoenix-svc.phoenix.svc.cluster.local:6006/v1/traces
        - name: EE_BASE_URL
          value: http://ee-api-poc-svc.er.svc.cluster.local:8010
        - name: AWS_BEARER_TOKEN_BEDROCK
          valueFrom:
            secretKeyRef:
              name: aws-bearer-token-bedrock-secret
              key: AWS_BEARER_TOKEN_BEDROCK
      imagePullSecrets:
      - name: er-ghcr-secret