# Example: New PV for the same EFS filesystem
apiVersion: v1
kind: PersistentVolume
metadata:
  name: er-efs-pv
spec:
  capacity:
    storage: 20Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: efs-sc
  csi:
    driver: efs.csi.aws.com
    volumeHandle: fs-0112711496ed9d301